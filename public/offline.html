<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SubFlow — Hors-ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px 30px;
      max-width: 400px;
    }
    .offline-icon {
      font-size: 72px;
      margin-bottom: 24px;
      opacity: 0.8;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }
    p {
      font-size: 15px;
      color: rgba(255,255,255,0.7);
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .retry-btn {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .retry-btn:hover {
      background: rgba(255,255,255,0.25);
    }
    .info {
      margin-top: 30px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="offline-icon">📴</div>
    <h1>Vous êtes hors-ligne</h1>
    <p>
      Pas de connexion Internet détectée.<br>
      Votre QR Code d'abonné reste accessible même sans connexion.
    </p>
    <a href="/" class="retry-btn" onclick="location.reload()">Réessayer</a>
    <p class="info">SubFlow — Votre abonnement continue même sans réseau.</p>
  </div>
</body>
</html>
