# ============================================================
# NGINX PRODUCTION CONFIGURATION - SUBFLOW
# ============================================================
# Ce fichier sert de modèle pour le déploiement sur le serveur.
# À placer typiquement dans /etc/nginx/sites-available/subflow
# puis faire un lien symbolique :
# ln -s /etc/nginx/sites-available/subflow /etc/nginx/sites-enabled/
# ============================================================

server {
    # Port par défaut HTTP
    listen 80;
    server_name www.votre-domaine.com votre-domaine.com;

    # ==========================
    # REDIRECTION HTTPS (Phase Production Certbot)
    # ==========================
    # Décommentez les lignes suivantes lorsque le certificat SSL Let's Encrypt est installé :
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/votre-domaine.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/votre-domaine.com/privkey.pem;
    # if ($scheme != "https") {
    #     return 301 https://$host$request_uri;
    # }

    # ==========================
    # LOGS NGINX
    # ==========================
    access_log /var/log/nginx/subflow_access.log;
    error_log /var/log/nginx/subflow_error.log;

    # ==========================
    # SÉCURITÉ DE BASE
    # ==========================
    # Cacher la version de nginx
    server_tokens off;

    # Empêcher le site d'être chargé dans une iFrame (protection anti-clickjacking)
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Bloquer le reniflage de type MIME
    add_header X-Content-Type-Options "nosniff" always;

    # Empêcher l'exécution de scripts cross-site (XSS)
    add_header X-XSS-Protection "1; mode=block" always;


    # ==========================
    # 1. FRONTEND (VITE REACT)
    # ==========================
    # Le frontend est compilé de façon statique (npm run build).
    # Nginx sert les fichiers très rapidement sans faire appel à Node.js
    location / {
        root /var/www/subflow/frontend/dist; # Mettez le vrai chemin absolu de votre dossier "dist"
        index index.html index.htm;
        
        # Rediriger toutes les routes inconnues vers index.html (essentiel pour React Router)
        try_files $uri $uri/ /index.html;
    }

    # Optimisation des assets statiques (mise en cache maximum)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        root /var/www/subflow/frontend/dist;
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    # ==========================
    # 2. BACKEND (EXPRESS API)
    # ==========================
    # Toutes les requêtes commençant par /api sont silencieusement proxyfiées
    # vers le serveur backend Node.js en arrière-plan.
    location /api/ {
        # Transmission de l'IP du vrai client pour le Webhook Whitelisting
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;

        # Transfert vers le port Node (ex: 3000)
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_redirect off;

        # Timeout augmentés si certaines requêtes (comme les exports CSV) prennent du temps
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }
}
